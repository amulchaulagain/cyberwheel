# Evaluation Parameters
red_agent: rl_red_campaign.yaml
blue_agent: rl_blue_agent.yaml
environment: CyberwheelEmulator
valid_targets: servers
red_model: MultiAgentRedModel2
blue_model: MultiAgentBlueModel2
campaign: true
seed: 1
max_decoys: 5

checkpoint: agent
download_model: true
run: mpalb8n8
wandb_project_name: Cyberwheel # required if download_model is true
wandb_entity: oeschsec # required if download_model is true

experiment: MultiAgentTest2
