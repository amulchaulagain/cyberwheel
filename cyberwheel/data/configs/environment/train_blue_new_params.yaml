# Training Parameters
experiment_name: BFSDelayAgent_NewRLParams # The experiment name
seed: 1 # The seed to use for the experiment
deterministic: false # Whether or not the training is deterministic
device: cuda:0 # Which device to train on
async_env: true # Whether to run the environments in parallel
total_timesteps: 100000000 # Total number of steps to run throughout training
num_saves: 100 # Number of times the model is evaluated and saved during the training run
num_envs: 128 # Number of game environments to run at once (parallel if async_env == true)
num_steps: 300 # Number of steps to run per episode
eval_episodes: 5 # Number of episodes to run in an evaluation

# Environment Parameters
environment: CyberwheelRL # Environment class to use
network_config: # Name of network config or list of network configs if training multiple
  #- 10-host-network.yaml
  #- 15-host-network.yaml
  #- 25-host-network.yaml
  #- 50-host-network.yaml
  #- 75-host-network.yaml
  - 100-host-network.yaml
  #- 200-host-network.yaml
  #- 1000-host-network.yaml
  #- 10000-host-network.yaml
network_size_compatibility: medium # The largest network size that this agent can be evaluated against (small/medium/large - 100/1K/10K hosts and 10/100/1K subnets limit)
host_config: host_defs_services.yaml # Host configuration filename in config/host_definitions
decoy_config: decoy_hosts.yaml # Decoy configuration filename in config/detector
red_agent: bfs_exfiltration.yaml # Red agent configuration filename in config/red_agent
train_red: false
campaign: false
valid_targets: leader
blue_agent: rl_blue_agent.yaml # Blue agent configuration filename in config/blue_agent
train_blue: true
max_decoys: 10
reward_function: StepAccomplishedReward # The reward function
detector_config: perfect_detector.yaml # Detector configuration filename in config/detector

# RL Parameters
env_id: cyberwheel # Environment ID
learning_rate: 5.0e-4 #2.5e-4 # Learning rate value of the optimizer
anneal_lr: true # Whether or not to anneal the learning rate for policy and value networks
gamma: 0.99 # The discount factor (gamma value)
gae_lambda: 0.9 # Lambda for the general advantage estimation
num_minibatches: 8 # Number of minibatches
update_epochs: 8 # Number of epochs to update the policy
norm_adv: true # Whether or not to normalize advantages
clip_coef: 0.3 # Surrogate clipping coefficient
clip_vloss: true # Whether to use clipped loss for the value function
ent_coef: 0.02 # Coefficient of entropy
vf_coef: 0.3 # Coefficient of the value function
max_grad_norm: 1.0 # The maximum norm for the gradient clipping
target_kl: 0.015 # The target KL Divergence Threshold

# Weights & Biases Parameters (optional)
track: true
wandb_project_name: Cyberwheel # The W&B project name if tracking
wandb_entity: oeschsec # The W&B entity if tracking